worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  upstream backend {
    server backend:8080;
  }

  upstream frontend {
    server frontend:80;
  }

  server {
    listen 80;

    # Frontend SPA
    location / {
      proxy_pass http://frontend;
      try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
      proxy_pass http://backend;
    }

    location /auth/ {
      proxy_pass http://backend;
    }
  }
}

